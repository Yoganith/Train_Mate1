name: train_booking_app
description: A new Flutter project.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  google_maps_flutter: ^2.2.2 # For map in food ordering
  geolocator: ^10.1.0
  permission_handler: ^11.0.0
  flutter_svg: ^2.0.7 # For icons
  provider: ^6.1.4 # State management
  flutter_animate: ^4.5.2 # For smooth animations
  google_fonts: ^6.1.0 # For custom fonts
  flutter_custom_clippers: ^2.1.0 # For custom shapes
  glassmorphism: ^3.0.0 # For glass effects
  shimmer: ^3.0.0 # For loading effects
  cached_network_image: ^3.3.0 # For image caching
  lottie: ^2.7.0 # For Lottie animations

  shared_preferences: ^2.2.2 # For local storage
  go_router: ^13.0.1 # For modern navigation
  http: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
